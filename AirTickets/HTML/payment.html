<!DOCTYPE html>
<html lang="el">
<head>
    <title>e-AirTickets - Πληρωμή</title>
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/forms.css">
    <link rel="icon" type="image/x-icon" href="../Assets/Images/favicon.ico">
</head>
<body>

    <header>
        <div class="header-left">
            <h1>e-AirTickets</h1>
            <h4>AirContinental</h4>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="content-box">
                <h2>2. Πληρωμή Κράτησης</h2>
                <label>Κωδικός Αίτησης Κράτησης:</label>
                <input type="text" id="appCode" placeholder="Εισάγετε τον 6ψήφιο κωδικό" maxlength="6" required>
                <button type="button" onclick="checkApplicationCode()">Έλεγχος Κωδικού</button>

                <div id="paymentSection" style="display:none; margin-top:20px;">
                    <p style="font-size: 1.2rem; color: #28a745;">Συνολικό Κόστος: <strong id="displayCost">0€</strong></p>
                    
                    <label>Αριθμός Κάρτας:</label>
                    <input type="text" id="cardNumber" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="16" required>

                    <label>Κινητό Τηλέφωνο:</label>
                    <input type="tel" id="mobileNumber" placeholder="69XXXXXXXX" maxlength="10" required>

                    <button type="button" onclick="executePayment()">Πληρωμή & Λήψη SMS Check-in</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 e-AirTickets TP4881 KOSTANTINOS BOURMPAKIS</p>
    </footer>

    <script src="../JS/script.js"></script>
</body>
</html>
